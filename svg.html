<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG•SCOPE — Vector Oscilloscope</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --green: #00ff9f; --accent: #00ccff; }
        
        body {
            background: #050505;
            color: var(--green);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        header {
            background: #111;
            border-bottom: 6px solid var(--green);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
            box-shadow: 0 0 25px rgba(0,255,159,0.6);
        }
        h1 { font-size: 2.6rem; letter-spacing: 6px; text-shadow: 0 0 15px var(--green); margin:0; }
        
        .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        button, input[type="file"] { 
            background:#111; color:var(--green); border:2px solid var(--green); 
            padding:9px 16px; font-family:inherit; cursor:pointer; font-size:1.15rem;
        }
        button:hover { background:var(--green); color:#000; }
        button.export { background:#004400; border-color:#00cc66; }
        button.export:hover { background:#00cc66; color:#000; }
        
        .main { flex:1; display:flex; padding:15px; gap:15px; overflow:hidden; }
        
        .scope-container {
            flex:1; background:#000; border:10px solid #1a1a1a; border-radius:12px;
            position:relative; box-shadow:0 0 80px rgba(0,255,159,0.7);
            overflow:hidden;
        }
        #oscilloscope { width:100%; height:100%; }
        
        .crt { position:absolute; inset:0; pointer-events:none;
            background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0,255,159,0.06) 3px, rgba(0,255,159,0.06) 6px);
            box-shadow: inset 0 0 140px rgba(0,0,0,0.95);
        }
        
        .sidebar {
            width: 390px; background:#111; border:5px solid var(--green);
            padding:18px; display:flex; flex-direction:column; gap:20px; overflow-y:auto;
        }
        
        label { display:block; margin:6px 0 3px; color:#999; }
        input[type="range"] { width:100%; accent-color:var(--green); }
        
        .tab-bar { display:flex; gap:8px; margin-bottom:12px; }
        .tab {
            padding:8px 16px; background:#1a1a1a; border:2px solid #333; cursor:pointer;
        }
        .tab.active { background:var(--green); color:#000; border-color:var(--green); }
        
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .auto-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        .dir-btn {
            padding: 4px 10px;
            font-size: 0.9rem;
        }
        .active-dir { background: var(--green); color: #000; }
        
        .status { color:#ffcc00; font-size:1.3rem; }
    </style>
</head>
<body>
    <header>
        <h1>SVG•SCOPE</h1>
        <div class="controls">
            <label><input type="file" id="fileInput" accept=".svg" style="display:none"><button onclick="document.getElementById('fileInput').click()">LOAD .SVG</button></label>
            <button id="playBtn">▶ PLAY</button>
            <button id="pauseBtn" style="display:none">⏸ PAUSE</button>
            <button onclick="exportWAV()" class="export">💾 EXPORT WAV</button>
            <button onclick="resetAll()">RESET</button>
        </div>
        <div class="status" id="status">READY — Full SVG Contained in Scope</div>
    </header>
    
    <div class="main">
        <div class="scope-container">
            <canvas id="oscilloscope" width="1400" height="720"></canvas>
            <div class="crt"></div>
        </div>
        
        <div class="sidebar">
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab(0)" id="tab0">TRACE</div>
                <div class="tab" onclick="switchTab(1)" id="tab1">EFFECTS</div>
            </div>
            
            <div id="panel0">
                <h2>TRACE MODE</h2>
                <div class="mode-grid">
                    <button onclick="setMode(0)" id="m0">Single</button>
                    <button onclick="setMode(1)" id="m1">Dual</button>
                    <button onclick="setMode(2)" id="m2">Object</button>
                    <button onclick="setMode(3)" id="m3" class="active">XY Shape</button>
                </div>
                
                <h2>MANUAL ROTATION</h2>
                <label>X <span id="rxVal">0</span>°</label><input type="range" id="rotX" min="-180" max="180" value="0">
                <label>Y <span id="ryVal">0</span>°</label><input type="range" id="rotY" min="-180" max="180" value="0">
                <label>Z <span id="rzVal">0</span>°</label><input type="range" id="rotZ" min="-180" max="180" value="0">
                
                <h2>AUTO ROTATION</h2>
                <label>Global Speed <span id="autoSpeedVal">1.0</span>x</label>
                <input type="range" id="autoSpeed" min="0.1" max="6" value="1" step="0.1">
                
                <div class="auto-group">
                    <label style="margin:0">X Axis</label>
                    <input type="checkbox" id="autoX" onchange="toggleAuto('X')">
                    <button onclick="setDirection('X', 1)" id="dirXfwd" class="dir-btn active-dir">→</button>
                    <button onclick="setDirection('X', -1)" id="dirXrev" class="dir-btn">←</button>
                </div>
                
                <div class="auto-group">
                    <label style="margin:0">Y Axis</label>
                    <input type="checkbox" id="autoY" onchange="toggleAuto('Y')">
                    <button onclick="setDirection('Y', 1)" id="dirYfwd" class="dir-btn active-dir">→</button>
                    <button onclick="setDirection('Y', -1)" id="dirYrev" class="dir-btn">←</button>
                </div>
                
                <div class="auto-group">
                    <label style="margin:0">Z Axis</label>
                    <input type="checkbox" id="autoZ" onchange="toggleAuto('Z')">
                    <button onclick="setDirection('Z', 1)" id="dirZfwd" class="dir-btn active-dir">→</button>
                    <button onclick="setDirection('Z', -1)" id="dirZrev" class="dir-btn">←</button>
                </div>
                
                <h2>FREQUENCY</h2>
                <label>Hz: <span id="freqVal">440</span></label>
                <input type="range" id="freqSlider" min="20" max="2500" value="440" step="1">
            </div>
            
            <div id="panel1" style="display:none">
                <h2>EFFECTS</h2>
                <label>Distortion <span id="distVal">0</span>%</label>
                <input type="range" id="distortion" min="0" max="80" value="0">
                <label>Noise <span id="noiseVal">0</span>%</label>
                <input type="range" id="noise" min="0" max="40" value="0">
                <label>Filter <span id="filterVal">2200</span> Hz</label>
                <input type="range" id="filter" min="200" max="8000" value="2200" step="50">
            </div>
            
            <div id="waveInfo" style="background:#000;padding:14px;border:2px solid #333;flex:1;font-size:1.05rem;">
                SVG fully contained • Rotation affects sound & shape
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('oscilloscope');
        const ctx = canvas.getContext('2d');
        
        let audioContext, gainNode, filterNode, sourceNode, audioBuffer;
        let isPlaying = false;
        let animationFrame;
        
        let points = [];           // original [x, y] from SVG
        let vertices = [];         // rotated points
        let waveform = [], waveform2 = [], waveformCombined = [];
        
        let rotX = 0, rotY = 0, rotZ = 0;
        let frequency = 440;
        let currentMode = 3;
        
        let distortion = 0, noiseAmount = 0, filterFreq = 2200;
        
        let phase = 0;
        let audioUpdateTimeout = null;
        
        // Auto rotation
        let autoX = false, autoY = false, autoZ = false;
        let dirX = 1, dirY = 1, dirZ = 1;
        let autoSpeed = 1.0;
        
        function applyRotation() {
            if (!points.length) return;
            vertices = [];
            
            const rx = rotX * Math.PI/180;
            const ry = rotY * Math.PI/180;
            const rz = rotZ * Math.PI/180;
            
            for (let [px, py] of points) {
                let x = px, y = py, z = 0;
                
                // Rotate around Y (most visible)
                let tx = x * Math.cos(ry) + z * Math.sin(ry);
                z = -x * Math.sin(ry) + z * Math.cos(ry);
                x = tx;
                
                // Rotate around X
                let ty = y * Math.cos(rx) - z * Math.sin(rx);
                z = y * Math.sin(rx) + z * Math.cos(rx);
                y = ty;
                
                // Rotate around Z
                tx = x * Math.cos(rz) - y * Math.sin(rz);
                ty = x * Math.sin(rz) + y * Math.cos(rz);
                x = tx; y = ty;
                
                vertices.push(x, y, z);
            }
            generateWaveforms();
        }
        
        function generateWaveforms() {
            if (!vertices.length) return;
            const maxVal = Math.max(...vertices.map(Math.abs)) || 1;
            const scale = 0.9 / maxVal;
            
            waveform = []; waveform2 = []; waveformCombined = [];
            
            for (let i = 0; i < vertices.length; i += 3) {
                const x = vertices[i] * scale;
                const y = vertices[i+1] * scale;
                const z = vertices[i+2] * scale;
                waveform.push(x*0.8 + y*0.5 + z*0.3);
                waveform2.push(y*0.9 + z*0.6 + x*0.4);
            }
            
            for (let i = 0; i < waveform.length; i++) {
                const val = waveform[i] * 0.65 + waveform2[i % waveform2.length] * 0.55;
                waveformCombined.push(val);
            }
            
            createAudioBuffer();
            updateInfo();
        }
        
        function createAudioBuffer() {
            if (!audioContext || !waveform.length) return;
            const sr = audioContext.sampleRate;
            const duration = 12;
            audioBuffer = audioContext.createBuffer(1, sr * duration, sr);
            const data = audioBuffer.getChannelData(0);
            const wf = (currentMode === 2 || currentMode === 3) ? waveformCombined : waveform;
            const samplesPerCycle = sr / frequency;
            
            for (let i = 0; i < data.length; i++) {
                let idx = Math.floor((i / samplesPerCycle) * wf.length) % wf.length;
                let sample = wf[idx] || 0;
                if (distortion > 0) sample = Math.tanh(sample * (1 + distortion/25));
                if (noiseAmount > 0) sample += (Math.random()-0.5) * (noiseAmount/120);
                data[i] = Math.max(-1, Math.min(1, sample * 0.85));
            }
        }
        
        function playSound() {
            if (!audioBuffer) return;
            if (sourceNode) sourceNode.stop();
            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.loop = true;
            
            filterNode = audioContext.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = filterFreq;
            
            sourceNode.connect(filterNode).connect(gainNode);
            sourceNode.start();
            isPlaying = true;
            
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
        }
        
        function pauseSound() {
            if (sourceNode) sourceNode.stop();
            sourceNode = null;
            isPlaying = false;
            document.getElementById('playBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
        }
        
        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioContext.createGain();
            gainNode.gain.value = 0.78;
            gainNode.connect(audioContext.destination);
        }
        
        // ====================== SVG PARSING + FIT TO SCOPE ======================
        function parseSVG(text) {
            points = [];
            const parser = new DOMParser();
            const svgDoc = parser.parseFromString(text, "image/svg+xml");
            const svg = svgDoc.documentElement;
            
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const paths = svgDoc.querySelectorAll('path, polygon, polyline, line, circle, rect, ellipse');
            
            paths.forEach(shape => {
                if (shape.tagName === 'path') {
                    const len = shape.getTotalLength() || 400;
                    const samples = Math.max(40, Math.min(1200, Math.floor(len / 2)));
                    for (let i = 0; i <= samples; i++) {
                        const p = shape.getPointAtLength(i * len / samples);
                        points.push([p.x, p.y]);
                        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
                    }
                } else if (shape.tagName === 'polygon' || shape.tagName === 'polyline') {
                    const ptsStr = shape.getAttribute('points') || '';
                    const nums = ptsStr.trim().split(/[\s,]+/).map(Number);
                    for (let i = 0; i < nums.length; i += 2) {
                        if (!isNaN(nums[i])) {
                            points.push([nums[i], nums[i+1]]);
                            minX = Math.min(minX, nums[i]); maxX = Math.max(maxX, nums[i]);
                            minY = Math.min(minY, nums[i+1]); maxY = Math.max(maxY, nums[i+1]);
                        }
                    }
                }
            });
            
            if (points.length < 20) {
                // Demo shape
                for (let i = 0; i < 360; i += 6) {
                    const a = i * Math.PI / 180;
                    points.push([250 + Math.cos(a)*180, 250 + Math.sin(a*2.5)*120]);
                }
            }
            
            // === FIT TO SCOPE ===
            const width = maxX - minX || 500;
            const height = maxY - minY || 500;
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            
            const targetSize = 480; // safe area inside canvas
            const scaleFactor = targetSize / Math.max(width, height);
            
            points = points.map(([x, y]) => [
                (x - centerX) * scaleFactor,
                (y - centerY) * scaleFactor
            ]);
            
            document.getElementById('status').textContent = `SVG LOADED — ${points.length} points (fitted)`;
            resetRotation(false);
            applyRotation();
        }
        
        function exportWAV() {
            if (!audioBuffer) {
                alert("Generate audio first.");
                return;
            }
            const wav = audioBufferToWav(audioBuffer);
            const blob = new Blob([wav], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `svgscope_${Date.now()}.wav`; a.click();
            URL.revokeObjectURL(url);
        }
        
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const dataLength = buffer.length * numChannels * 2;
            const bufferLength = 44 + dataLength;
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            writeString(view, 0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            let offset = 44;
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                const s = Math.max(-1, Math.min(1, data[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
            return arrayBuffer;
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        }
        
        function updateInfo() {
            const modes = ["Single", "Dual", "Object", "XY Shape"];
            document.getElementById('waveInfo').innerHTML = `
                Mode: <b>${modes[currentMode]}</b><br>
                Points: ${points.length}<br>
                Freq: ${frequency} Hz<br>
                Rotation: ${rotX.toFixed(0)}° ${rotY.toFixed(0)}° ${rotZ.toFixed(0)}°
            `;
        }
        
        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-grid button').forEach((b,i) => b.classList.toggle('active', i===m));
            createAudioBuffer();
            if (isPlaying) playSound();
        }
        
        function resetAll() {
            rotX = rotY = rotZ = 0;
            autoX = autoY = autoZ = false;
            dirX = dirY = dirZ = 1;
            frequency = 440; distortion = noiseAmount = 0;
            document.getElementById('rotX').value = document.getElementById('rotY').value = document.getElementById('rotZ').value = 0;
            document.getElementById('autoX').checked = document.getElementById('autoY').checked = document.getElementById('autoZ').checked = false;
            document.getElementById('freqSlider').value = 440;
            updateDirectionButtons();
            applyRotation();
        }
        
        function resetRotation(update=true) {
            rotX=rotY=rotZ=0;
            document.getElementById('rotX').value = document.getElementById('rotY').value = document.getElementById('rotZ').value = 0;
            if (update) applyRotation();
        }
        
        function toggleAuto(axis) {
            if (axis === 'X') autoX = document.getElementById('autoX').checked;
            if (axis === 'Y') autoY = document.getElementById('autoY').checked;
            if (axis === 'Z') autoZ = document.getElementById('autoZ').checked;
        }
        
        function setDirection(axis, dir) {
            if (axis === 'X') dirX = dir;
            if (axis === 'Y') dirY = dir;
            if (axis === 'Z') dirZ = dir;
            updateDirectionButtons();
        }
        
        function updateDirectionButtons() {
            document.getElementById('dirXfwd').classList.toggle('active-dir', dirX === 1);
            document.getElementById('dirXrev').classList.toggle('active-dir', dirX === -1);
            document.getElementById('dirYfwd').classList.toggle('active-dir', dirY === 1);
            document.getElementById('dirYrev').classList.toggle('active-dir', dirY === -1);
            document.getElementById('dirZfwd').classList.toggle('active-dir', dirZ === 1);
            document.getElementById('dirZrev').classList.toggle('active-dir', dirZ === -1);
        }
        
        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
            document.getElementById('panel0').style.display = n===0 ? 'block' : 'none';
            document.getElementById('panel1').style.display = n===1 ? 'block' : 'none';
        }
        
        function updateAudioThrottled() {
            if (audioUpdateTimeout) clearTimeout(audioUpdateTimeout);
            audioUpdateTimeout = setTimeout(() => {
                createAudioBuffer();
                if (isPlaying) playSound();
            }, 80);
        }
        
        function drawScope() {
            ctx.fillStyle = 'rgba(3,8,8,0.94)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(0,255,159,0.13)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
            
            if (vertices.length) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const visualScale = Math.min(canvas.width, canvas.height) * 0.37;
                
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#00ff9f';
                ctx.lineWidth = 2.2;
                ctx.lineJoin = 'round';
                
                if (currentMode === 3) {
                    ctx.strokeStyle = '#00ff9f';
                    ctx.beginPath();
                    let first = true;
                    const step = Math.max(1, Math.floor(vertices.length / 3 / 900));
                    for (let i = 0; i < vertices.length; i += 3 * step) {
                        const x = vertices[i] * visualScale + centerX;
                        const y = vertices[i+1] * visualScale + centerY;
                        if (first) { ctx.moveTo(x, y); first = false; }
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.shadowBlur = 55;
                    ctx.lineWidth = 1.1;
                    ctx.stroke();
                } else {
                    const wf = (currentMode === 2) ? waveformCombined : waveform;
                    const len = Math.min(1250, wf.length);
                    ctx.strokeStyle = '#00ff9f';
                    ctx.lineWidth = currentMode === 2 ? 4 : 3.5;
                    ctx.beginPath();
                    for (let i = 0; i < len; i++) {
                        const idx = Math.floor(i * (wf.length / len) + phase * 60) % wf.length;
                        const x = (i / len) * canvas.width;
                        const y = centerY - wf[idx] * (canvas.height * 0.37);
                        i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
                    }
                    ctx.stroke();
                }
            }
            
            // Auto Rotation
            const delta = 0.8 * autoSpeed;
            if (autoX) rotX = (rotX + delta * dirX + 360) % 360;
            if (autoY) rotY = (rotY + delta * dirY + 360) % 360;
            if (autoZ) rotZ = (rotZ + delta * dirZ + 360) % 360;
            
            if (autoX || autoY || autoZ) {
                document.getElementById('rotX').value = rotX % 360;
                document.getElementById('rotY').value = rotY % 360;
                document.getElementById('rotZ').value = rotZ % 360;
                document.getElementById('rxVal').textContent = rotX.toFixed(0);
                document.getElementById('ryVal').textContent = rotY.toFixed(0);
                document.getElementById('rzVal').textContent = rotZ.toFixed(0);
                
                applyRotation();
                updateAudioThrottled();
            }
            
            phase += frequency / 6800;
            animationFrame = requestAnimationFrame(drawScope);
        }
        
        // Event Listeners
        document.getElementById('fileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('status').textContent = 'LOADING SVG...';
            const reader = new FileReader();
            reader.onload = ev => parseSVG(ev.target.result);
            reader.readAsText(file);
        });
        
        document.getElementById('playBtn').onclick = () => { initAudio(); playSound(); };
        document.getElementById('pauseBtn').onclick = pauseSound;
        
        document.querySelectorAll('#rotX,#rotY,#rotZ').forEach(sl => {
            sl.addEventListener('input', () => {
                rotX = +document.getElementById('rotX').value;
                rotY = +document.getElementById('rotY').value;
                rotZ = +document.getElementById('rotZ').value;
                document.getElementById('rxVal').textContent = rotX.toFixed(0);
                document.getElementById('ryVal').textContent = rotY.toFixed(0);
                document.getElementById('rzVal').textContent = rotZ.toFixed(0);
                applyRotation();
                updateAudioThrottled();
            });
        });
        
        document.getElementById('autoSpeed').addEventListener('input', e => {
            autoSpeed = +e.target.value;
            document.getElementById('autoSpeedVal').textContent = autoSpeed.toFixed(1);
        });
        
        document.getElementById('freqSlider').addEventListener('input', e => {
            frequency = +e.target.value;
            document.getElementById('freqVal').textContent = frequency;
            createAudioBuffer();
            if (isPlaying) playSound();
        });
        
        document.getElementById('distortion').addEventListener('input', e => { 
            distortion = +e.target.value; 
            document.getElementById('distVal').textContent = distortion;
            createAudioBuffer();
            if (isPlaying) playSound();
        });
        document.getElementById('noise').addEventListener('input', e => { 
            noiseAmount = +e.target.value; 
            document.getElementById('noiseVal').textContent = noiseAmount;
            createAudioBuffer();
            if (isPlaying) playSound();
        });
        document.getElementById('filter').addEventListener('input', e => { 
            filterFreq = +e.target.value; 
            document.getElementById('filterVal').textContent = filterFreq;
            if (filterNode) filterNode.frequency.value = filterFreq;
        });
        
        window.onload = () => {
            initAudio();
            drawScope();
            updateDirectionButtons();
            
            // Nice demo shape
            setTimeout(() => {
                if (!points.length) {
                    points = [];
                    for (let i = 0; i < 480; i++) {
                        const a = i * 0.026;
                        points.push([
                            Math.sin(a) * 210 + Math.cos(a*4)*45,
                            Math.cos(a*1.7) * 160 + Math.sin(a*2.8)*55
                        ]);
                    }
                    applyRotation();
                }
            }, 300);
        };
    </script>
